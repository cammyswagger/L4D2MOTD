<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>永寂神域 · 求生之路2 战役登录器</title>
    <!-- 引入 Font Awesome 6 (免费图标库，用于复制图标和Steam小图标) -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none; /* 避免拖动文字影响按钮点击，但保留文本复制功能正常 */
        }

        body {
            background: #000000;
            background-image: radial-gradient(circle at 25% 40%, rgba(30, 30, 40, 0.6) 0%, #000000 90%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Segoe UI', 'Poppins', 'Orbitron', 'Inter', system-ui, -apple-system, 'Microsoft YaHei', sans-serif;
            padding: 2rem 1.5rem;
            position: relative;
        }

        /* 科技感网格叠加 (装饰) */
        body::before {
            content: "";
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: 
                linear-gradient(rgba(0, 255, 255, 0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0, 255, 255, 0.03) 1px, transparent 1px);
            background-size: 40px 40px;
            pointer-events: none;
            z-index: 0;
        }

        /* 主容器 */
        .login-container {
            position: relative;
            z-index: 2;
            max-width: 1300px;
            width: 100%;
            background: rgba(0, 0, 0, 0.65);
            backdrop-filter: blur(3px);
            border-radius: 3rem;
            padding: 2.2rem 2rem 3rem;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.6), 0 0 0 1px rgba(0, 255, 255, 0.15);
            transition: all 0.2s ease;
        }

        /* 主标题区 */
        .hero {
            text-align: center;
            margin-bottom: 3rem;
            position: relative;
        }

        .hero h1 {
            font-size: 2.6rem;
            font-weight: 800;
            letter-spacing: 2px;
            background: linear-gradient(135deg, #FFFFFF 0%, #a0f0ff 40%, #6c5ce7 100%);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
            text-shadow: 0 0 12px rgba(0, 255, 255, 0.4);
            margin-bottom: 0.75rem;
            word-break: keep-all;
        }

        .hero p {
            color: #bbb;
            font-size: 1rem;
            border-top: 1px solid rgba(0, 255, 255, 0.3);
            display: inline-block;
            padding-top: 0.7rem;
            letter-spacing: 1px;
            font-weight: 300;
        }

        .hero p i {
            color: #2ecc71;
            margin-right: 6px;
        }

        /* 服务器网格布局 */
        .servers-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(310px, 1fr));
            gap: 1.8rem;
            margin: 2rem 0 2.5rem;
        }

        /* 风格化按钮卡片 */
        .server-card {
            background: rgba(10, 12, 18, 0.85);
            backdrop-filter: blur(8px);
            border-radius: 2rem;
            border: 1px solid rgba(0, 255, 255, 0.3);
            transition: all 0.25s cubic-bezier(0.2, 0.9, 0.4, 1.1);
            cursor: pointer;
            position: relative;
            overflow: hidden;
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.5);
        }

        /* 光晕动画背景 */
        .server-card::before {
            content: "";
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(0, 230, 250, 0.1), transparent);
            transition: left 0.6s ease;
            pointer-events: none;
        }

        .server-card:hover::before {
            left: 100%;
        }

        .server-card:hover {
            transform: translateY(-8px);
            border-color: rgba(0, 255, 255, 0.9);
            box-shadow: 0 18px 32px -8px rgba(0, 200, 255, 0.3), 0 0 0 1px rgba(0, 255, 200, 0.2);
            background: rgba(12, 16, 28, 0.95);
        }

        .server-card:active {
            transform: translateY(-3px);
            transition: 0.05s;
        }

        /* 按钮主要内容区 (点击链接区域) */
        .card-main {
            padding: 1.6rem 1.5rem 1.6rem 1.8rem;
            display: flex;
            flex-direction: column;
            gap: 0.65rem;
        }

        .server-name {
            font-size: 1.75rem;
            font-weight: 800;
            background: linear-gradient(120deg, #f0f9ff, #b9f6ff);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
            letter-spacing: -0.3px;
            display: flex;
            align-items: center;
            gap: 10px;
            flex-wrap: wrap;
        }

        .server-name i {
            font-size: 1.6rem;
            color: #2ecc71;
            filter: drop-shadow(0 0 4px #2ecc71);
            background: none;
            -webkit-background-clip: unset;
            color: #2ecc71;
        }

        .server-ip {
            font-family: 'Fira Code', 'JetBrains Mono', monospace;
            font-size: 1rem;
            background: rgba(0, 0, 0, 0.55);
            padding: 0.5rem 0.8rem;
            border-radius: 1.5rem;
            display: inline-block;
            width: fit-content;
            color: #b0e0ff;
            border-left: 3px solid #0ff;
            letter-spacing: 0.5px;
            word-break: break-all;
        }

        .server-ip i {
            margin-right: 0.4rem;
            font-size: 0.85rem;
            color: #0ff;
        }

        .connect-hint {
            font-size: 0.7rem;
            color: #aaa;
            margin-top: 6px;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .connect-hint i {
            font-size: 0.7rem;
            color: #55ffcc;
        }

        /* 复制按钮 (独立于点击区域) */
        .copy-btn {
            position: absolute;
            bottom: 16px;
            right: 18px;
            background: rgba(0, 20, 30, 0.7);
            backdrop-filter: blur(4px);
            border-radius: 40px;
            padding: 8px 12px;
            font-size: 0.75rem;
            color: #ccf;
            border: 1px solid rgba(0, 255, 255, 0.4);
            cursor: pointer;
            transition: 0.2s;
            display: flex;
            align-items: center;
            gap: 5px;
            z-index: 12;
            font-weight: 500;
        }

        .copy-btn i {
            font-size: 0.8rem;
        }

        .copy-btn:hover {
            background: #0ff22d20;
            color: #ffffff;
            border-color: #0ff;
            box-shadow: 0 0 8px rgba(0, 255, 200, 0.3);
            transform: scale(1.02);
        }

        /* 页脚说明 */
        .footer-note {
            text-align: center;
            margin-top: 2rem;
            font-size: 0.8rem;
            color: #777;
            border-top: 1px dashed rgba(0, 255, 255, 0.2);
            padding-top: 1.8rem;
            display: flex;
            justify-content: center;
            gap: 1.2rem;
            flex-wrap: wrap;
        }

        .footer-note span {
            background: rgba(0, 0, 0, 0.5);
            padding: 0.3rem 1rem;
            border-radius: 30px;
            letter-spacing: 0.5px;
        }

        .footer-note i {
            margin-right: 6px;
            color: #0ff;
        }

        /* 简易toast提示 */
        .toast-msg {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%) translateY(20px);
            background: #1e2a2f;
            backdrop-filter: blur(10px);
            color: #d0f0ff;
            padding: 12px 24px;
            border-radius: 60px;
            font-size: 0.9rem;
            font-weight: 500;
            z-index: 1000;
            box-shadow: 0 5px 18px rgba(0,0,0,0.5), 0 0 0 1px #0ff44a55;
            opacity: 0;
            transition: opacity 0.2s, transform 0.2s;
            pointer-events: none;
            white-space: nowrap;
            font-family: monospace;
        }

        .toast-msg.show {
            opacity: 1;
            transform: translateX(-50%) translateY(0);
        }

        /* 响应式调整 */
        @media (max-width: 720px) {
            .login-container {
                padding: 1.5rem;
            }
            .hero h1 {
                font-size: 1.8rem;
            }
            .server-name {
                font-size: 1.35rem;
            }
            .server-ip {
                font-size: 0.8rem;
            }
            .copy-btn {
                padding: 5px 10px;
                font-size: 0.65rem;
                bottom: 12px;
                right: 12px;
            }
            .card-main {
                padding: 1.2rem 1rem 1.2rem 1.3rem;
            }
            .servers-grid {
                gap: 1.2rem;
            }
            .footer-note span {
                font-size: 0.7rem;
            }
        }

        /* Steam 启动时加载效果 */
        button, .server-card {
            cursor: pointer;
        }
    </style>
</head>
<body>

<div class="login-container">
    <div class="hero">
        <h1>⚔️ 永寂神域 RPG 战役 网页登录器 ⚔️</h1>
        <p><i class="fab fa-steam"></i> 官方指定登录器 · 点击任意服务器直接唤醒Steam加入游戏</p>
    </div>

    <!-- 服务器卡片容器，动态JS生成 以保证数据和样式统一 -->
    <div id="serversContainer" class="servers-grid"></div>

    <div class="footer-note">
        <span><i class="fas fa-skull"></i> 永寂神域RPG战役 · 专属网页入口</span>
        <span><i class="fas fa-gamepad"></i> 点击按钮 → Steam自动启动L4D2并连接</span>
        <span><i class="fas fa-copy"></i> 进入游戏按 ~ 键打开控制台 → 点击右下角📋复制粘贴IP到控制台 </span>
    </div>
</div>

<div id="toastMsg" class="toast-msg">✨ 已复制 connect 指令 ✨</div>

<script>
    // ---------- 服务器数据 ----------
    // 1-4服使用旧IP 111.229.0.95，5-8服用新IP 114.66.33.8
    const servers = [
        {
            name: "永寂神域 RPG 1服",
            ip: "111.229.0.95",
            port: "27020",
            fullDisplay: "永寂神域 RPG 1服"
        },
        {
            name: "永寂神域 RPG 2服",
            ip: "111.229.0.95",
            port: "27021",
            fullDisplay: "永寂神域 RPG 2服"
        },
        {
            name: "永寂神域 RPG 3服",
            ip: "111.229.0.95",
            port: "27022",
            fullDisplay: "永寂神域 RPG 3服"
        },
        {
            name: "永寂神域 RPG 4服",
            ip: "111.229.0.95",
            port: "27023",
            fullDisplay: "永寂神域 RPG 4服"
        },
        {
            name: "永寂神域 RPG 5服",
            ip: "114.66.33.8",
            port: "27024",
            fullDisplay: "永寂神域 RPG 5服"
        },
        {
            name: "永寂神域 RPG 6服",
            ip: "114.66.33.8",
            port: "27025",
            fullDisplay: "永寂神域 RPG 6服"
        },
        {
            name: "永寂神域 RPG 7服",
            ip: "114.66.33.8",
            port: "27026",
            fullDisplay: "永寂神域 RPG 7服"
        },
        {
            name: "永寂神域 RPG 8服",
            ip: "114.66.33.8",
            port: "27027",
            fullDisplay: "永寂神域 RPG 8服"
        }
    ];

    // 辅助函数: 生成完整的 steam://connect/ip:port
    function getSteamConnectUrl(ip, port) {
        return `steam://connect/${ip}:${port}`;
    }

    // 辅助函数: 获取完整的 "connect IP:PORT" 字符串 (用于复制)
    function getConnectCommand(ip, port) {
        return `connect ${ip}:${port}`;
    }

    // Toast 提示功能
    let toastTimer = null;
    function showToast(message, isError = false) {
        const toast = document.getElementById('toastMsg');
        if (!toast) return;
        if (toastTimer) clearTimeout(toastTimer);
        toast.textContent = message || (isError ? '⚠️ 复制失败，请手动复制' : '📋 复制成功！');
        if (isError) {
            toast.style.background = "#4a1a1a";
            toast.style.borderColor = "#ff7777";
        } else {
            toast.style.background = "#1e2a2f";
            toast.style.borderColor = "#0ff44a55";
        }
        toast.classList.add('show');
        toastTimer = setTimeout(() => {
            toast.classList.remove('show');
        }, 2000);
    }

    // 复制文本到剪贴板 (兼容现代浏览器)
    async function copyToClipboard(text, successMsg = "📋 已复制 connect 指令") {
        try {
            await navigator.clipboard.writeText(text);
            showToast(successMsg, false);
        } catch (err) {
            const textarea = document.createElement('textarea');
            textarea.value = text;
            document.body.appendChild(textarea);
            textarea.select();
            document.execCommand('copy');
            document.body.removeChild(textarea);
            showToast(successMsg, false);
        }
    }

    // 连接服务器 (通过 Steam 协议)
    function connectToServer(ip, port, serverName) {
        const steamUrl = getSteamConnectUrl(ip, port);
        console.log(`[启动] 尝试连接: ${serverName} | ${steamUrl}`);
        showToast(`⚡ 正在启动Steam并连接 ${serverName} ...`, false);
        window.location.href = steamUrl;
    }

    // 渲染服务器卡片
    function renderServers() {
        const container = document.getElementById('serversContainer');
        if (!container) return;

        container.innerHTML = '';

        servers.forEach(server => {
            const { name, ip, port } = server;
            const ipDisplay = `${ip}:${port}`;
            const connectFullCommand = getConnectCommand(ip, port);
            
            const card = document.createElement('div');
            card.className = 'server-card';
            
            const mainArea = document.createElement('div');
            mainArea.className = 'card-main';
            
            const nameSpan = document.createElement('div');
            nameSpan.className = 'server-name';
            nameSpan.innerHTML = `<i class="fas fa-dragon"></i> ${name}`;
            
            const ipSpan = document.createElement('div');
            ipSpan.className = 'server-ip';
            ipSpan.innerHTML = `<i class="fas fa-network-wired"></i> connect ${ipDisplay}`;
            
            const hintSpan = document.createElement('div');
            hintSpan.className = 'connect-hint';
            hintSpan.innerHTML = `<i class="fab fa-steam"></i> 点击卡片 → 自动唤醒Steam`;
            
            mainArea.appendChild(nameSpan);
            mainArea.appendChild(ipSpan);
            mainArea.appendChild(hintSpan);
            
            const copyButton = document.createElement('div');
            copyButton.className = 'copy-btn';
            copyButton.innerHTML = `<i class="fas fa-copy"></i> 复制 connect 指令`;
            copyButton.addEventListener('click', (e) => {
                e.stopPropagation();
                copyToClipboard(connectFullCommand, `✅ 已复制: ${connectFullCommand}`);
            });
            
            card.appendChild(mainArea);
            card.appendChild(copyButton);
            
            card.addEventListener('click', (e) => {
                if (e.target.closest('.copy-btn')) return;
                connectToServer(ip, port, name);
            });
            
            container.appendChild(card);
        });
    }

    function initPage() {
        renderServers();
        console.log("%c永寂神域·战役登录器 | 已装载全部服务器入口 | 点击卡片即用steam://connect协议", "color: #0ff; font-size: 14px;");
        const isMobile = /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent);
        if (isMobile) {
            setTimeout(() => {
                showToast("💡 手机端建议复制指令到PC端Steam控制台使用", false);
            }, 1000);
        }
    }

    if (document.readyState === 'loading') {
        document.addEventListener('DOMContentLoaded', initPage);
    } else {
        initPage();
    }
</script>
</body>
</html>
