<!DOCTYPE html>
<html>
<head>
    <meta http-equiv="Content-Type" content="text/html; charset=utf-8">
    <title>服务器每日信息</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #1b1b1b;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        .content {
            padding: 20px;
            background-color: #2d2d2d;
            border-radius: 8px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
        }
        img {
            max-width: 100%;
            height: auto;
            display: block;
            margin: 0 auto;
            border-radius: 4px;
        }
        .info-text {
            text-align: center;
            margin-top: 15px;
            color: #e0e0e0;
            font-family: Arial, sans-serif;
            font-size: 14px;
        }
    </style>
</head>
<body>
<div class="content">
    <!-- 在这里替换成你实际的图片链接 -->
    <img src="https://raw.githubusercontent.com/cammyswagger/L4D2MOTD/main/1.jpg" alt="服务器图片">
    <div class="info-text">
        欢迎来到服务器！祝您游戏愉快！
    </div>
</div>
</body>
</html>
